name: Évaluation de soumission

on:
  pull_request:
    paths:
      - 'submissions/*.enc'
      - 'submissions/**/*.enc'

jobs:
  evaluate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Installer les dépendances
        run: pip install cryptography numpy pandas scikit-learn

      - name: Décoder les labels de test depuis les secrets
        env:
          TEST_LABELS_B64: ${{ secrets.TEST_LABELS_BASE64 }}
        run: |
          echo "$TEST_LABELS_B64" | base64 --decode > evaluation/test_labels.npy

      - name: Récupérer le nom du fichier de soumission
        id: submission
        run: |
          git fetch origin ${{ github.base_ref }}
          FILE=$(git diff --name-only --diff-filter=A origin/${{ github.base_ref }}...HEAD | grep '^submissions/.*\.enc$' | head -n1)
          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Déchiffrer la soumission
        if: steps.submission.outputs.file != ''
        continue-on-error: true
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: python encryption/decrypt.py --input "${{ steps.submission.outputs.file }}" --output /tmp/predictions.txt

      - name: Exécuter le scoring
        if: steps.submission.outputs.file != ''
        continue-on-error: true
        run: python evaluation/score.py --predictions /tmp/predictions.txt --submission "${{ steps.submission.outputs.file }}" --output /tmp/results.json

      - name: Mettre à jour le leaderboard
        if: steps.submission.outputs.file != ''
        run: |
          if [ -f /tmp/results.json ]; then
            git fetch origin main
            git checkout main
            python leaderboard/update_leaderboard.py /tmp/results.json
          fi

      - name: Committer le leaderboard mis à jour
        if: steps.submission.outputs.file != ''
        run: |
          if [ -f leaderboard/leaderboard.csv ]; then
            git config --global user.name 'github-actions'
            git config --global user.email 'actions@github.com'
            git add leaderboard/leaderboard.csv
            git diff --cached --quiet || git commit -m "Mise à jour du leaderboard"
            git push origin main
          fi

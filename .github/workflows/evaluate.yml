name: Évaluation de soumission

on:
  pull_request:
    paths:
      - 'submissions/**'

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Configurer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Installer les dépendances (numpy uniquement pour l'évaluation)
        run: pip install numpy

      - name: Décoder les labels de test depuis les secrets
        env:
          TEST_LABELS_B64: ${{ secrets.TEST_LABELS_BASE64 }}
        run: |
          echo "$TEST_LABELS_B64" | base64 --decode > evaluation/test_labels.npy

      - name: Récupérer le nom du fichier de soumission
        id: submission
        run: |
          # On récupère le premier fichier ajouté dans submissions/
          FILE=$(git diff --name-only --diff-filter=A origin/${{ github.base_ref }}...HEAD | grep '^submissions/' | head -n1)
          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Exécuter l'évaluation
        if: steps.submission.outputs.file != ''
        run: python evaluation/score.py ${{ steps.submission.outputs.file }}

      - name: Mettre à jour le leaderboard
        if: steps.submission.outputs.file != ''
        env:
          GITHUB_ACTOR: ${{ github.actor }}
        run: python leaderboard/update.py score.json

      - name: Committer le leaderboard mis à jour
        if: steps.submission.outputs.file != ''
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'actions@github.com'
          git add leaderboard/README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "Mise à jour du leaderboard"
          git push